name: Temporary review fixes

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply review fixes
        run: python tools/apply_review_fixes.py
      - name: Commit and cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f tools/apply_review_fixes.py .github/workflows/temp-review-fixes.yml
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "fix: address review follow-up hardening"
            git push
          fi
